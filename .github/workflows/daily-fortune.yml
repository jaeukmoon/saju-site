name: daily-fortune

on:
  schedule:
    - cron: '37 22 * * *'   # 22:37 UTC = 07:37 KST next morning (GitHub cron may add delay)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fortune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate today's fortune
        env:
          SAJU_NAME: ${{ secrets.SAJU_NAME }}
          SAJU_BIRTH: ${{ secrets.SAJU_BIRTH }}
          SAJU_GENDER: ${{ secrets.SAJU_GENDER }}
          SAJU_BTIME: ${{ secrets.SAJU_BTIME }}
        run: node scripts/daily.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "daily: $(TZ=Asia/Seoul date +%F) fortune"
          git push
