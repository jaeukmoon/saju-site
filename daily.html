<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아침 운세 — 달빛사주</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="%23f0c75e"/><circle cx="64" cy="42" r="34" fill="%230d0b1e"/></svg>'>
<style>
:root{
  --bg:#0d0b1e; --bg2:#171233; --card:rgba(255,255,255,.045); --line:rgba(240,199,94,.22);
  --gold:#f0c75e; --gold2:#d4a437; --ink:#efeaf7; --sub:#a79fc4; --dim:#6f6693;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 55%,#0e0a20 100%);
  color:var(--ink); min-height:100vh; letter-spacing:-.01em;
}
.wrap{max-width:480px;margin:0 auto;padding:28px 18px 60px}
header{text-align:center;margin-bottom:22px}
.moon{font-size:30px;color:var(--gold);text-shadow:0 0 24px rgba(240,199,94,.55);line-height:1}
h1{font-size:24px;font-weight:800;margin-top:6px;
  background:linear-gradient(120deg,#fbe7ae,var(--gold) 45%,#b8873a);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.tagline{color:var(--sub);font-size:13px;margin-top:5px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:16px;
  box-shadow:0 8px 28px rgba(0,0,0,.35)}
h2{font-size:14px;color:var(--gold);font-weight:700;letter-spacing:.14em;margin-bottom:14px}
h2 small{color:var(--dim);letter-spacing:0;font-weight:500;margin-left:8px}
.greet{font-size:17px;font-weight:800;line-height:1.5;margin-bottom:2px}
.greet .hl{color:var(--gold)}
.greet-sub{color:var(--sub);font-size:12px;margin-top:4px}
.hero{display:flex;gap:18px;align-items:center;margin-bottom:14px}
.donut{--p:70;width:104px;height:104px;flex:none;border-radius:50%;position:relative;
  background:conic-gradient(var(--gold) calc(var(--p)*1%), rgba(255,255,255,.08) 0)}
.donut::before{content:"";position:absolute;inset:9px;border-radius:50%;background:#141031}
.donut b{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:30px;color:var(--gold)}
.donut b small{font-size:11px;color:var(--sub);font-weight:500;margin-top:2px}
.hero p{font-size:14px;line-height:1.65}
.cats{display:flex;flex-direction:column;gap:12px;margin-top:6px}
.cat .t{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.cat .t b{font-weight:700}
.cat .t span{color:var(--gold);font-weight:700}
.bar{height:7px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden}
.bar i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,#8a6ad4,var(--gold))}
.cat p{font-size:12.5px;color:var(--sub);margin-top:5px;line-height:1.55}
.lucky{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.chip{flex:1;min-width:90px;text-align:center;background:rgba(240,199,94,.08);border:1px solid var(--line);
  border-radius:12px;padding:10px 6px}
.chip small{display:block;font-size:11px;color:var(--dim);margin-bottom:4px}
.chip b{font-size:14px;color:var(--gold)}
.prose{font-size:14px;line-height:1.75}
.badge{display:inline-block;background:rgba(240,199,94,.12);border:1px solid var(--line);
  color:var(--gold);border-radius:8px;padding:2px 9px;font-size:12px;font-weight:700;margin-bottom:10px}
.stale{background:rgba(212,87,78,.12);border:1px solid rgba(212,87,78,.4);color:#ffb6b0;
  border-radius:12px;padding:10px 14px;font-size:12.5px;line-height:1.5;margin-bottom:16px}
footer{text-align:center;color:var(--dim);font-size:12px;margin-top:26px;line-height:1.8}
footer a{color:var(--gold2)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="moon">&#9790;</div>
    <h1>아침 운세</h1>
    <div class="tagline">매일 아침 자동 갱신 · 달빛사주</div>
  </header>
  <div id="app"><div class="card">불러오는 중…</div></div>
  <footer><a href="index.html">→ 직접 사주 전체 보기</a></footer>
</div>
<script>
'use strict';
function kstToday(){
  var n = new Date(Date.now() + 9*3600000);
  var p = function(x){ return String(x).padStart(2,'0'); };
  return n.getUTCFullYear()+'-'+p(n.getUTCMonth()+1)+'-'+p(n.getUTCDate());
}
fetch('data/daily.json?_=' + Date.now())
  .then(function(r){ if(!r.ok) throw 0; return r.json(); })
  .then(function(d){
    var catHtml = d.cats.map(function(c){
      return '<div class="cat"><div class="t"><b>'+c.label+'</b><span>'+c.score+'점</span></div>'+
        '<div class="bar"><i style="width:'+c.score+'%"></i></div><p>'+c.text+'</p></div>';
    }).join('');
    var stale = d.date !== kstToday()
      ? '<div class="stale">가장 최근 생성분은 '+d.date+' 운세입니다. 오늘 아침 자동 생성이 아직 실행되지 않았어요.</div>' : '';
    document.getElementById('app').innerHTML = stale +
      '<div class="card"><div class="greet"><span class="hl">'+d.name+'</span>님의 '+d.date+' 운세</div>'+
      '<div class="greet-sub">명식 '+d.saju.year+' '+d.saju.month+' '+d.saju.day+(d.saju.hour?' '+d.saju.hour:'')+
      ' · 오늘 일진 '+d.todayPillar+' ('+d.tenGod+(d.branchRel?'·'+d.branchRel:'')+')</div></div>'+
      '<div class="card"><h2>오늘의 운세 <small>'+d.generated_kst+' KST 생성</small></h2>'+
      '<div class="hero"><div class="donut" style="--p:'+d.tot+'"><b>'+d.tot+'<small>총운</small></b></div>'+
      '<p>'+d.heroText+'</p></div>'+
      '<div class="cats">'+catHtml+'</div>'+
      '<div class="lucky">'+
        '<div class="chip"><small>행운의 색</small><b>'+d.lucky.color+'</b></div>'+
        '<div class="chip"><small>행운의 숫자</small><b>'+d.lucky.num+'</b></div>'+
        '<div class="chip"><small>행운의 방향</small><b>'+d.lucky.dir+'</b></div>'+
      '</div></div>'+
      '<div class="card"><h2>올해의 흐름 <small>'+d.yearly.year+'</small></h2>'+
      '<div class="prose"><span class="badge">'+d.yearly.tg+' 운</span><br>'+d.yearly.text+'</div></div>';
  })
  .catch(function(){
    document.getElementById('app').innerHTML =
      '<div class="card">아직 생성된 운세가 없습니다. 매일 아침 자동으로 만들어집니다.</div>';
  });
</script>
</body>
</html>
